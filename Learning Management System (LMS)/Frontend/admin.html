<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i> LMS <span>Admin Panel</span>
        </div>
        <ul>
            <!-- Populated dynamically by script.js -->
        </ul>
    </nav>
</header>

<div class="container" style="max-width: 1300px;">
    <h1>LMS Admin Dashboard</h1>

    <!-- Nav Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('students')"><i class="fa-solid fa-user-graduate"></i> Students</button>
        <button class="tab-btn" onclick="switchTab('instructors')"><i class="fa-solid fa-user-tie"></i> Instructors</button>
        <button class="tab-btn" onclick="switchTab('courses')"><i class="fa-solid fa-book"></i> Courses</button>
        <button class="tab-btn" onclick="switchTab('enrollments')"><i class="fa-solid fa-calendar-check"></i> Enrollments</button>
        <button class="tab-btn" onclick="switchTab('assignments')"><i class="fa-solid fa-clipboard-question"></i> Assignments</button>
    </div>

    <!-- Header Actions -->
    <div class="admin-header-actions">
        <h3 id="currentTabTitle" style="color: var(--secondary);">Manage Students</h3>
        <button class="btn-add" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add New Record</button>
    </div>

    <!-- Tables Container -->
    <div class="table-responsive">
        <table id="adminTable">
            <thead id="adminTableHeader">
                <!-- Dynamically configured -->
            </thead>
            <tbody id="adminTableBody">
                <!-- Dynamically configured -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Record Modal -->
<div id="recordModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add Record</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="recordForm" onsubmit="handleFormSubmit(event)">
            <div class="modal-body" id="modalFields">
                <!-- Dynamic form fields depending on active tab -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn-add" style="margin-top:0;" id="btnSubmitForm">Save Record</button>
            </div>
        </form>
    </div>
</div>

<footer>
    <p>© 2026 Learning Management System. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>
<script>
    let activeTab = 'students';
    let editingId = null; // Stores PK database ID of record being edited

    // Cache lists to populate dropdown fields
    let dbStudents = [];
    let dbInstructors = [];
    let dbCourses = [];

    document.addEventListener("DOMContentLoaded", () => {
        switchTab('students');
    });

    async function switchTab(tab) {
        activeTab = tab;
        editingId = null;
        
        // Update tabs active state
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if(btn.getAttribute('onclick').includes(tab)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        // Set Title
        const titles = {
            students: "Manage Students",
            instructors: "Manage Instructors",
            courses: "Manage Courses",
            enrollments: "Manage Enrollments",
            assignments: "Manage Assignments"
        };
        document.getElementById("currentTabTitle").innerText = titles[tab];

        // Fetch support lists for relation dropdowns
        await fetchReferenceLists();
        
        // Refresh Table
        loadTableData();
    }

    async function fetchReferenceLists() {
        try {
            dbStudents = await apiCall("/students/");
            dbInstructors = await apiCall("/instructors/");
            dbCourses = await apiCall("/courses/");
        } catch(e) {
            console.error("Error loading supporting reference data", e);
        }
    }

    async function loadTableData() {
        const header = document.getElementById("adminTableHeader");
        const tbody = document.getElementById("adminTableBody");
        
        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding:30px;"><i class="fa-solid fa-spinner fa-spin fa-xl"></i> Loading data...</td></tr>`;

        try {
            const data = await apiCall(`/${activeTab}/`);
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding:30px; color:var(--text-muted);">No records found.</td></tr>`;
                return;
            }

            configureHeaders(header);
            populateRows(data, tbody);
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:var(--danger); padding:30px;"><i class="fa-solid fa-circle-exclamation fa-xl"></i> Failed to retrieve records from backend API.</td></tr>`;
        }
    }

    function configureHeaders(header) {
        let cells = [];
        if(activeTab === 'students') {
            cells = ["Student ID", "Full Name", "Email", "Phone", "Qualification", "Actions"];
        } else if(activeTab === 'instructors') {
            cells = ["Instructor ID", "Name", "Specialization", "Experience (Yrs)", "Email", "Phone", "Actions"];
        } else if(activeTab === 'courses') {
            cells = ["Course ID", "Course Name", "Instructor", "Category", "Duration", "Price", "Level", "Actions"];
        } else if(activeTab === 'enrollments') {
            cells = ["Enrollment ID", "Student", "Course", "Date Enrolled", "Payment", "Status", "Actions"];
        } else if(activeTab === 'assignments') {
            cells = ["Assignment ID", "Student", "Course", "Assignment Title", "Submission Date", "Marks", "Status", "Actions"];
        }
        
        header.innerHTML = `<tr>${cells.map(c => `<th>${c}</th>`).join("")}</tr>`;
    }

    function populateRows(data, tbody) {
        data.forEach(item => {
            const tr = document.createElement("tr");
            let columns = [];
            const pk = item.id; // DB Primary Key

            if(activeTab === 'students') {
                columns = [
                    `<b>#${item.student_id}</b>`,
                    item.full_name,
                    item.email,
                    item.phone,
                    item.qualification
                ];
            } else if(activeTab === 'instructors') {
                columns = [
                    `<b>#${item.instructor_id}</b>`,
                    item.instructor_name,
                    item.specialization,
                    `${item.experience} years`,
                    item.email,
                    item.phone
                ];
            } else if(activeTab === 'courses') {
                columns = [
                    `<b>#${item.course_id}</b>`,
                    item.course_name,
                    item.instructor_name,
                    item.category,
                    item.duration,
                    `₹${item.price.toLocaleString()}`,
                    `<span class="badge ${item.level === 'Beginner' ? 'badge-beginner' : item.level === 'Intermediate' ? 'badge-intermediate' : 'badge-advanced'}">${item.level}</span>`
                ];
            } else if(activeTab === 'enrollments') {
                columns = [
                    `<b>#${item.enrollment_id}</b>`,
                    item.student_name,
                    item.course_name,
                    item.enrollment_date,
                    `<span class="badge ${item.payment_status === 'Paid' ? 'badge-paid' : 'badge-pending'}">${item.payment_status}</span>`,
                    `<span class="badge ${item.course_status === 'Active' ? 'badge-active' : item.course_status === 'Completed' ? 'badge-completed' : 'badge-cancelled'}">${item.course_status}</span>`
                ];
            } else if(activeTab === 'assignments') {
                columns = [
                    `<b>#${item.assignment_id}</b>`,
                    item.student_name,
                    item.course_name,
                    item.assignment_title,
                    item.submission_date || "-",
                    item.marks !== null ? `<b>${item.marks}</b>` : "-",
                    `<span class="badge ${item.status === 'Pending' ? 'badge-pending' : item.status === 'Submitted' ? 'badge-submitted' : 'badge-evaluated'}">${item.status}</span>`
                ];
            }

            const actionsCell = `
                <td>
                    <button type="button" class="btn-action btn-action-edit" onclick="openEditModal(${JSON.stringify(item).replace(/"/g, '&quot;')}); event.preventDefault();"><i class="fa fa-pencil"></i> Edit</button>
                    <button type="button" class="btn-action btn-action-delete" onclick="deleteRecord(${pk}); event.preventDefault();"><i class="fa fa-trash"></i> Delete</button>
                </td>
            `;

            tr.innerHTML = columns.map(c => `<td>${c}</td>`).join("") + actionsCell;
            tbody.appendChild(tr);
        });
    }

    function openAddModal() {
        editingId = null;
        document.getElementById("modalTitle").innerText = `Add ${activeTab.slice(0,-1).toUpperCase()}`;
        document.getElementById("btnSubmitForm").innerHTML = `<i class="fa-solid fa-plus"></i> Save Record`;
        buildFormFields();
        document.getElementById("recordModal").style.display = "flex";
    }

    function openEditModal(record) {
        editingId = record.id;
        document.getElementById("modalTitle").innerText = `Edit ${activeTab.slice(0,-1).toUpperCase()} #${record.id}`;
        document.getElementById("btnSubmitForm").innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Update Record`;
        buildFormFields(record);
        document.getElementById("recordModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("recordModal").style.display = "none";
        document.getElementById("recordForm").reset();
    }

    function buildFormFields(record = null) {
        const container = document.getElementById("modalFields");
        container.innerHTML = "";

        if(activeTab === 'students') {
            container.innerHTML = `
                <div class="form-container" style="max-width:100%; padding:0; border:none; box-shadow:none; margin:0;">
                    <div class="form-group">
                        <label>Student ID (Numeric)</label>
                        <input type="number" id="f_student_id" value="${record ? record.student_id : ''}" required ${record ? 'readonly' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="f_full_name" value="${record ? record.full_name : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="f_email" value="${record ? record.email : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="f_phone" value="${record ? record.phone : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Qualification</label>
                        <input type="text" id="f_qualification" value="${record ? record.qualification : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="f_password" value="${record ? record.password : ''}" required>
                    </div>
                </div>
            `;
        } else if(activeTab === 'instructors') {
            container.innerHTML = `
                <div class="form-container" style="max-width:100%; padding:0; border:none; box-shadow:none; margin:0;">
                    <div class="form-group">
                        <label>Instructor ID (Numeric)</label>
                        <input type="number" id="f_instructor_id" value="${record ? record.instructor_id : ''}" required ${record ? 'readonly' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Instructor Name</label>
                        <input type="text" id="f_instructor_name" value="${record ? record.instructor_name : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Specialization</label>
                        <input type="text" id="f_specialization" value="${record ? record.specialization : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Experience (Years)</label>
                        <input type="number" id="f_experience" value="${record ? record.experience : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="f_email" value="${record ? record.email : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="f_phone" value="${record ? record.phone : ''}" required>
                    </div>
                </div>
            `;
        } else if(activeTab === 'courses') {
            // Populate instructor name select options
            const instOptions = dbInstructors.map(i => `<option value="${i.instructor_name}" ${record && record.instructor_name === i.instructor_name ? 'selected' : ''}>${i.instructor_name}</option>`).join("");
            container.innerHTML = `
                <div class="form-container" style="max-width:100%; padding:0; border:none; box-shadow:none; margin:0;">
                    <div class="form-group">
                        <label>Course ID (Numeric)</label>
                        <input type="number" id="f_course_id" value="${record ? record.course_id : ''}" required ${record ? 'readonly' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" id="f_course_name" value="${record ? record.course_name : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Instructor</label>
                        <select id="f_instructor_name" required>
                            <option value="">Select Instructor</option>
                            ${instOptions}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="f_category" value="${record ? record.category : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <input type="text" id="f_duration" value="${record ? record.duration : ''}" placeholder="e.g. 6 Months" required>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="f_price" value="${record ? record.price : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Level</label>
                        <select id="f_level" required>
                            <option value="Beginner" ${record && record.level === 'Beginner' ? 'selected' : ''}>Beginner</option>
                            <option value="Intermediate" ${record && record.level === 'Intermediate' ? 'selected' : ''}>Intermediate</option>
                            <option value="Advanced" ${record && record.level === 'Advanced' ? 'selected' : ''}>Advanced</option>
                        </select>
                    </div>
                </div>
            `;
        } else if(activeTab === 'enrollments') {
            const studentOpts = dbStudents.map(s => `<option value="${s.full_name}" ${record && record.student_name === s.full_name ? 'selected' : ''}>${s.full_name}</option>`).join("");
            const courseOpts = dbCourses.map(c => `<option value="${c.course_name}" ${record && record.course_name === c.course_name ? 'selected' : ''}>${c.course_name}</option>`).join("");
            
            container.innerHTML = `
                <div class="form-container" style="max-width:100%; padding:0; border:none; box-shadow:none; margin:0;">
                    <div class="form-group">
                        <label>Enrollment ID (Numeric)</label>
                        <input type="number" id="f_enrollment_id" value="${record ? record.enrollment_id : ''}" required ${record ? 'readonly' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Student</label>
                        <select id="f_student_name" required>
                            <option value="">Select Student</option>
                            ${studentOpts}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <select id="f_course_name" required>
                            <option value="">Select Course</option>
                            ${courseOpts}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Enrollment Date</label>
                        <input type="date" id="f_enrollment_date" value="${record ? record.enrollment_date : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="f_payment_status" required>
                            <option value="Paid" ${record && record.payment_status === 'Paid' ? 'selected' : ''}>Paid</option>
                            <option value="Pending" ${record && record.payment_status === 'Pending' ? 'selected' : ''}>Pending</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Course Status</label>
                        <select id="f_course_status" required>
                            <option value="Active" ${record && record.course_status === 'Active' ? 'selected' : ''}>Active</option>
                            <option value="Completed" ${record && record.course_status === 'Completed' ? 'selected' : ''}>Completed</option>
                            <option value="Cancelled" ${record && record.course_status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </div>
                </div>
            `;
        } else if(activeTab === 'assignments') {
            const studentOpts = dbStudents.map(s => `<option value="${s.full_name}" ${record && record.student_name === s.full_name ? 'selected' : ''}>${s.full_name}</option>`).join("");
            const courseOpts = dbCourses.map(c => `<option value="${c.course_name}" ${record && record.course_name === c.course_name ? 'selected' : ''}>${c.course_name}</option>`).join("");
            
            container.innerHTML = `
                <div class="form-container" style="max-width:100%; padding:0; border:none; box-shadow:none; margin:0;">
                    <div class="form-group">
                        <label>Assignment ID (Numeric)</label>
                        <input type="number" id="f_assignment_id" value="${record ? record.assignment_id : ''}" required ${record ? 'readonly' : ''}>
                    </div>
                    <div class="form-group">
                        <label>Student</label>
                        <select id="f_student_name" required>
                            <option value="">Select Student</option>
                            ${studentOpts}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <select id="f_course_name" required>
                            <option value="">Select Course</option>
                            ${courseOpts}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assignment Title</label>
                        <input type="text" id="f_assignment_title" value="${record ? record.assignment_title : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Submission Date</label>
                        <input type="date" id="f_submission_date" value="${record && record.submission_date ? record.submission_date : ''}">
                    </div>
                    <div class="form-group">
                        <label>Marks (0-100)</label>
                        <input type="number" id="f_marks" min="0" max="100" value="${record && record.marks !== null ? record.marks : ''}" placeholder="e.g. 95 (Leave blank if pending)">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="f_status" required>
                            <option value="Pending" ${record && record.status === 'Pending' ? 'selected' : ''}>Pending</option>
                            <option value="Submitted" ${record && record.status === 'Submitted' ? 'selected' : ''}>Submitted</option>
                            <option value="Evaluated" ${record && record.status === 'Evaluated' ? 'selected' : ''}>Evaluated</option>
                        </select>
                    </div>
                </div>
            `;
        }
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        
        let payload = {};
        
        if(activeTab === 'students') {
            payload = {
                student_id: parseInt(document.getElementById("f_student_id").value),
                full_name: document.getElementById("f_full_name").value.trim(),
                email: document.getElementById("f_email").value.trim(),
                phone: document.getElementById("f_phone").value.trim(),
                qualification: document.getElementById("f_qualification").value.trim(),
                password: document.getElementById("f_password").value
            };
        } else if(activeTab === 'instructors') {
            payload = {
                instructor_id: parseInt(document.getElementById("f_instructor_id").value),
                instructor_name: document.getElementById("f_instructor_name").value.trim(),
                specialization: document.getElementById("f_specialization").value.trim(),
                experience: parseInt(document.getElementById("f_experience").value),
                email: document.getElementById("f_email").value.trim(),
                phone: document.getElementById("f_phone").value.trim()
            };
        } else if(activeTab === 'courses') {
            payload = {
                course_id: parseInt(document.getElementById("f_course_id").value),
                course_name: document.getElementById("f_course_name").value.trim(),
                instructor_name: document.getElementById("f_instructor_name").value,
                category: document.getElementById("f_category").value.trim(),
                duration: document.getElementById("f_duration").value.trim(),
                price: parseFloat(document.getElementById("f_price").value),
                level: document.getElementById("f_level").value
            };
        } else if(activeTab === 'enrollments') {
            payload = {
                enrollment_id: parseInt(document.getElementById("f_enrollment_id").value),
                student_name: document.getElementById("f_student_name").value,
                course_name: document.getElementById("f_course_name").value,
                enrollment_date: document.getElementById("f_enrollment_date").value,
                payment_status: document.getElementById("f_payment_status").value,
                course_status: document.getElementById("f_course_status").value
            };
        } else if(activeTab === 'assignments') {
            const marksVal = document.getElementById("f_marks").value;
            payload = {
                assignment_id: parseInt(document.getElementById("f_assignment_id").value),
                student_name: document.getElementById("f_student_name").value,
                course_name: document.getElementById("f_course_name").value,
                assignment_title: document.getElementById("f_assignment_title").value.trim(),
                submission_date: document.getElementById("f_submission_date").value || null,
                marks: marksVal !== "" ? parseInt(marksVal) : null,
                status: document.getElementById("f_status").value
            };
        }

        try {
            if (editingId) {
                // UPDATE (PUT)
                await apiCall(`/${activeTab}/update/${editingId}/`, "PUT", payload);
                alert("Record updated successfully!");
            } else {
                // CREATE (POST)
                await apiCall(`/${activeTab}/add/`, "POST", payload);
                alert("Record added successfully!");
            }
            closeModal();
            loadTableData();
        } catch(err) {
            alert("Action failed: " + err.message);
        }
    }

    async function deleteRecord(pk) {
        if(!confirm("Are you sure you want to delete this record? This action is permanent!")) return;
        
        try {
            await apiCall(`/${activeTab}/delete/${pk}/`, "DELETE");
            alert("Record deleted successfully!");
            loadTableData();
        } catch(e) {
            alert("Deletion failed: " + e.message);
        }
    }
</script>
</body>
</html>
